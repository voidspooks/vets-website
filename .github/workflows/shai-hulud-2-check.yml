name: Shai-Hulud 2.0 Security Check

on:
  push:
    branches:
      - "**"

jobs:
  security-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: gensecaihq/Shai-Hulud-2.0-Detector@55cd78e683ee88b1f0a7e084919908e402462ec3 # v1.0.2
        with:
          fail-on-critical: true
